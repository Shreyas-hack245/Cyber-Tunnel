<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Blocked IPs</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="d-flex">

    <div class="sidebar p-3">

        <h2 class="logo">CyberTunnel</h2>

        <a href="/">Dashboard</a>
        <a href="/blocked">Blocked IPs</a>
        <a href="/geo">Geo Monitoring</a>
        <a href="/threat">Threat Intelligence</a>
        <a href="/logs">Security Logs</a>

    </div>

    <div class="main-content container-fluid">

        <h1 class="page-title">Blocked Threat IPs</h1>

        <div class="panel">

            <table class="table table-dark table-hover">

                <thead>

                    <tr>
                        <th>Blocked IP Address</th>
                    </tr>

                </thead>

                <tbody>

                    {% for ip in blocked_ips %}

                    <tr>
                        <td>{{ ip }}</td>
                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
